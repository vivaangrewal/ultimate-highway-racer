<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Traffic Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center}
#backLink{position:fixed;top:10px;left:10px;z-index:100;color:#f44;text-decoration:none;font-size:16px;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:8px;border:1px solid #f44}
#backLink:hover{background:#f44;color:#0a0a1a}
canvas{display:block}
#hud{position:fixed;top:10px;right:10px;text-align:right;font-size:15px;z-index:50;text-shadow:0 0 8px #000}
#hud div{margin:4px 0}
#lives{color:#f44}
#startScreen,#gameOverScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.92);z-index:60}
#gameOverScreen{display:none}
.title{font-size:clamp(28px,6vw,52px);color:#f44;text-shadow:0 0 30px #f44;margin-bottom:10px}
.subtitle{font-size:clamp(12px,2.5vw,18px);color:#aaa;margin-bottom:20px}
.info{font-size:clamp(11px,2vw,14px);color:#888;margin:4px 0;max-width:400px;text-align:center}
.btn{margin-top:20px;padding:14px 40px;font-size:18px;border:2px solid #f44;background:transparent;color:#f44;border-radius:10px;cursor:pointer;transition:0.2s}
.btn:hover{background:#f44;color:#0a0a1a}
#finalScore{font-size:clamp(32px,7vw,60px);color:#f4c430;text-shadow:0 0 20px #f4c430;margin:10px 0}
#nearMiss{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#f4c430;text-shadow:0 0 20px #f4c430;opacity:0;z-index:55;pointer-events:none;transition:opacity 0.2s}
#mobileControls{position:fixed;bottom:40px;left:0;width:100%;display:none;justify-content:space-around;padding:0 30px;z-index:55}
.touchBtn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,0.5);user-select:none;-webkit-user-select:none}
.touchBtn:active{background:rgba(255,68,68,0.3)}
@media(pointer:coarse){#mobileControls{display:flex}}
</style>
</head>
<body>
<a id="backLink" href="../">← BACK</a>
<div id="hud"><div id="distDisplay">Distance: 0m</div><div id="nearMissBonus">Near Miss: 0</div><div id="lives">♥♥♥</div></div>
<canvas id="c"></canvas>
<div id="nearMiss">NEAR MISS +50!</div>
<div id="mobileControls">
<div class="touchBtn" id="tl">◀</div>
<div class="touchBtn" id="tr">▶</div>
</div>
<div id="startScreen">
<div class="title">Traffic Racer</div>
<div class="subtitle">Weave through traffic at high speed</div>
<div class="info">Arrow Keys / A,D to change lanes</div>
<div class="info">Swipe left/right on mobile</div>
<div class="info">Dodge traffic, earn near-miss bonuses!</div>
<button class="btn" id="startBtn">RACE</button>
</div>
<div id="gameOverScreen">
<div class="title">WRECKED!</div>
<div id="finalScore">0</div>
<div class="info" id="finalStats"></div>
<button class="btn" id="restartBtn">RACE AGAIN</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

const LANE_COUNT=3;
let gameState='start',player,cars,roadOffset,speed,distance,lives,nearMissCount,gameOverTimer,touchStartX;
const keys={};

window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(['arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

function getLaneX(lane){let lw=W/LANE_COUNT;return lw*lane+lw/2}

function initGame(){
player={lane:1,x:getLaneX(1),y:H-120,w:40,h:70,color:'#f44',targetX:getLaneX(1),invincible:0};
cars=[];roadOffset=0;speed=5;distance=0;lives=3;nearMissCount=0;gameOverTimer=0;
}

function spawnCar(){
let lane=Math.floor(Math.random()*LANE_COUNT);
let colors=['#44f','#4f4','#fa0','#f4f','#4ff','#ff4','#88f','#f88'];
let car={lane,x:getLaneX(lane),y:-80,w:36,h:65,color:colors[Math.floor(Math.random()*colors.length)],speed:2+Math.random()*3};
// Avoid spawning on top of another car
for(let c of cars){
if(c.lane===car.lane&&Math.abs(c.y-car.y)<80)return;
}
cars.push(car);
}

function update(){
if(gameState!=='playing')return;
speed=5+distance*0.005;
distance+=speed*0.05;

// Lane switching
let targetLane=player.lane;
if(keys['arrowleft']||keys['a'])targetLane=Math.max(0,player.lane-1);
if(keys['arrowright']||keys['d'])targetLane=Math.min(LANE_COUNT-1,player.lane+1);
if(targetLane!==player.lane){player.lane=targetLane;player.targetX=getLaneX(targetLane)}
player.x+=(player.targetX-player.x)*0.15;
player.invincible=Math.max(0,player.invincible-1);

// Spawn cars
if(Math.random()<0.02+distance*0.0003)spawnCar();

// Update cars
cars.forEach(c=>{
c.y+=speed-c.speed;
// Near miss detection
if(c.lane===player.lane&&Math.abs(c.y-player.y)<20&&c.y<player.y&&c.y>player.y-30){
showNearMiss();
}
});
cars=cars.filter(c=>c.y<H+100);

// Collision
if(player.invincible<=0){
for(let i=cars.length-1;i>=0;i--){
let c=cars[i];
if(Math.abs(player.x-c.x)<(player.w+c.w)/2-5&&Math.abs(player.y-c.y)<(player.h+c.h)/2-5){
lives--;
player.invincible=90;
cars.splice(i,1);
if(lives<=0){gameState='over';gameOverTimer=60}
break;
}
}
}

document.getElementById('distDisplay').textContent='Distance: '+Math.floor(distance)+'m';
document.getElementById('nearMissBonus').textContent='Near Miss: '+nearMissCount;
document.getElementById('lives').textContent='♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
}

function showNearMiss(){
nearMissCount++;
let el=document.getElementById('nearMiss');
el.style.opacity='1';el.style.transition='none';
setTimeout(()=>{el.style.transition='opacity 0.5s';el.style.opacity='0'},100);
}

function drawRoad(){
ctx.fillStyle='#333';ctx.fillRect(0,0,W,H);
// Lane markings
let lw=W/LANE_COUNT;
ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.setLineDash([30,20]);ctx.lineDashOffset=-roadOffset;
for(let i=1;i<LANE_COUNT;i++){ctx.beginPath();ctx.moveTo(lw*i,0);ctx.lineTo(lw*i,H);ctx.stroke()}
ctx.setLineDash([]);
// Road edges
ctx.fillStyle='#f44';ctx.fillRect(0,0,6,H);ctx.fillRect(W-6,0,6,H);
roadOffset=(roadOffset+speed)%50;
}

function drawCar(car){
ctx.save();ctx.translate(car.x,car.y);
// Body
ctx.fillStyle=car.color;
ctx.beginPath();
ctx.roundRect(-car.w/2,-car.h/2,car.w,car.h,6);
ctx.fill();
// Windshield
ctx.fillStyle='rgba(150,200,255,0.5)';
ctx.fillRect(-car.w/2+4,-car.h/2+8,car.w-8,15);
// Rear window
ctx.fillRect(-car.w/2+4,car.h/2-18,car.w-8,12);
// Headlights
ctx.fillStyle='#ff4';
ctx.fillRect(-car.w/2+2,-car.h/2-2,8,5);
ctx.fillRect(car.w/2-10,-car.h/2-2,8,5);
// Taillights
ctx.fillStyle='#f00';
ctx.fillRect(-car.w/2+2,car.h/2-3,8,5);
ctx.fillRect(car.w/2-10,car.h/2-3,8,5);
ctx.restore();
}

function drawPlayer(){
let p=player;
ctx.save();ctx.translate(p.x,p.y);
let alpha=p.invincible>0?0.5+Math.sin(p.invincible*0.3)*0.3:1;
ctx.globalAlpha=alpha;
// Car body
ctx.fillStyle=p.color;
ctx.beginPath();ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,8);ctx.fill();
// Windshield
ctx.fillStyle='rgba(150,220,255,0.6)';
ctx.fillRect(-p.w/2+4,-p.h/2+10,p.w-8,16);
// Stripe
ctx.fillStyle='#fff';ctx.globalAlpha=alpha*0.5;
ctx.fillRect(-3,-p.h/2,6,p.h);
ctx.globalAlpha=alpha;
// Headlights glow
ctx.shadowColor='#ff4';ctx.shadowBlur=15;
ctx.fillStyle='#ff4';
ctx.fillRect(-p.w/2+2,-p.h/2-3,8,6);
ctx.fillRect(p.w/2-10,-p.h/2-3,8,6);
ctx.shadowBlur=0;
ctx.restore();
}

function draw(){
ctx.clearRect(0,0,W,H);
drawRoad();
cars.forEach(drawCar);
if(gameState==='playing'||gameState==='over')drawPlayer();
}

function gameLoop(){
if(gameState==='playing')update();
if(gameState==='over'){gameOverTimer--;if(gameOverTimer<=0)showGameOver()}
draw();
requestAnimationFrame(gameLoop);
}

function showGameOver(){
document.getElementById('gameOverScreen').style.display='flex';
document.getElementById('finalScore').textContent=Math.floor(distance)+'m';
document.getElementById('finalStats').textContent='Near Misses: '+nearMissCount;
}

function startGame(){
document.getElementById('startScreen').style.display='none';
document.getElementById('gameOverScreen').style.display='none';
initGame();gameState='playing';
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);

// Touch controls
document.getElementById('tl').addEventListener('touchstart',e=>{e.preventDefault();keys['arrowleft']=true});
document.getElementById('tl').addEventListener('touchend',()=>{keys['arrowleft']=false});
document.getElementById('tr').addEventListener('touchstart',e=>{e.preventDefault();keys['arrowright']=true});
document.getElementById('tr').addEventListener('touchend',()=>{keys['arrowright']=false});

canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX});
canvas.addEventListener('touchend',e=>{
if(touchStartX===null)return;
let dx=e.changedTouches[0].clientX-touchStartX;
if(Math.abs(dx)>30){keys[dx<0?'arrowleft':'arrowright']=true;setTimeout(()=>keys['arrowleft']=keys['arrowright']=false,200)}
touchStartX=null;
});

initGame();gameLoop();
</script>
</body>
</html>

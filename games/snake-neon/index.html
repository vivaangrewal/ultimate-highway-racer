<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Neon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#back{position:fixed;top:12px;left:12px;color:#0ff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid #0ff;border-radius:4px;z-index:100;transition:.2s}
#back:hover{background:#0ff;color:#0a0a1a}
#header{text-align:center;margin-bottom:8px}
#header h1{font-size:28px;color:#0f0;text-shadow:0 0 20px #0f0,0 0 40px #0f0}
#score-display{font-size:16px;color:#0ff;margin-top:4px}
#game-container{position:relative}
canvas{border:2px solid #0f0;border-radius:4px;display:block;box-shadow:0 0 30px rgba(0,255,0,0.3)}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.92);border-radius:4px;z-index:10}
.overlay.hidden{display:none}
.overlay h2{font-size:32px;margin-bottom:10px;text-shadow:0 0 20px currentColor}
.overlay p{font-size:16px;margin:6px 0;color:#aaa}
.overlay .final-score{font-size:48px;color:#0f0;margin:10px 0;text-shadow:0 0 20px #0f0}
.btn{margin-top:16px;padding:12px 36px;font-size:18px;border:2px solid #0f0;background:transparent;color:#0f0;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit}
.btn:hover{background:#0f0;color:#0a0a1a}
#start-screen h2{color:#0f0;text-shadow:0 0 30px #0f0}
#game-over-screen h2{color:#f44}
#win-screen h2{color:#ff0;text-shadow:0 0 30px #ff0}
#controls{margin-top:10px;font-size:12px;color:#555}
</style>
</head>
<body>
<a href="../" id="back">← BACK</a>
<div id="header">
<h1>SNAKE NEON</h1>
<div id="score-display">Score: <span id="score">0</span></div>
</div>
<div id="game-container">
<canvas id="canvas"></canvas>
<div class="overlay" id="start-screen">
<h2>SNAKE NEON</h2>
<p>Use Arrow Keys or WASD to move</p>
<p>Eat food to grow. Don't hit walls or yourself!</p>
<button class="btn" id="start-btn">START</button>
</div>
<div class="overlay hidden" id="game-over-screen">
<h2>GAME OVER</h2>
<div class="final-score" id="final-score">0</div>
<p>Score</p>
<button class="btn" id="restart-btn">PLAY AGAIN</button>
</div>
</div>
<div id="controls">Arrow Keys / WASD to move</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const startScreen=document.getElementById('start-screen');
const gameOverScreen=document.getElementById('game-over-screen');
const finalScoreEl=document.getElementById('final-score');

const GRID=20;
let cols,rows,cellSize;
function resize(){
  const maxW=Math.min(window.innerWidth-20,500);
  const maxH=Math.min(window.innerHeight-160,500);
  cellSize=Math.floor(Math.min(maxW,maxH)/GRID);
  cols=GRID;rows=GRID;
  canvas.width=cols*cellSize;
  canvas.height=rows*cellSize;
}
resize();
window.addEventListener('resize',()=>{resize();if(state==='playing')draw()});

let snake,dir,nextDir,food,score,state,speed,moveTimer;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;speed=120;moveTimer=0;
  scoreEl.textContent='0';
  placeFood();
}

function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function draw(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid lines
  ctx.strokeStyle='rgba(0,255,0,0.05)';
  ctx.lineWidth=0.5;
  for(let i=0;i<=cols;i++){
    ctx.beginPath();ctx.moveTo(i*cellSize,0);ctx.lineTo(i*cellSize,rows*cellSize);ctx.stroke();
  }
  for(let i=0;i<=rows;i++){
    ctx.beginPath();ctx.moveTo(0,i*cellSize);ctx.lineTo(cols*cellSize,i*cellSize);ctx.stroke();
  }

  // Snake
  snake.forEach((seg,i)=>{
    const x=seg.x*cellSize,y=seg.y*cellSize;
    const pct=1-i/snake.length;
    const g=Math.floor(200+55*pct);
    ctx.shadowColor=`rgb(0,${g},0)`;
    ctx.shadowBlur=15;
    ctx.fillStyle=`rgb(0,${g},50)`;
    ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
    ctx.shadowBlur=0;
    if(i===0){
      ctx.fillStyle='#0f0';
      const ex=dir.x===1?6:dir.x===-1?-2:dir.y===0?cellSize/2-4:cellSize/2-4;
      const ey=dir.y===1?6:dir.y===-1?-2:dir.x===0?cellSize/2-4:cellSize/2-4;
      ctx.fillRect(x+cellSize/2-2+(dir.x===0?0:dir.x>0?2:-2),y+cellSize/2-2+(dir.y===0?0:dir.y>0?2:-2),4,4);
    }
  });

  // Food
  ctx.shadowColor='#f0f';
  ctx.shadowBlur=20;
  ctx.fillStyle='#f0f';
  ctx.beginPath();
  ctx.arc(food.x*cellSize+cellSize/2,food.y*cellSize+cellSize/2,cellSize/2-3,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

let lastTime=0;
function loop(time){
  if(state!=='playing')return;
  const dt=time-lastTime;
  moveTimer+=dt;
  if(moveTimer>=speed){
    moveTimer=0;
    dir={...nextDir};
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){
      state='gameover';
      finalScoreEl.textContent=score;
      gameOverScreen.classList.remove('hidden');
      return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
      score+=10;
      scoreEl.textContent=score;
      if(speed>50)speed-=2;
      placeFood();
    }else{
      snake.pop();
    }
  }
  lastTime=time;
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  init();
  state='playing';
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  lastTime=performance.now();
  moveTimer=0;
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

document.addEventListener('keydown',e=>{
  if(state!=='playing')return;
  const k=e.key.toLowerCase();
  if((k==='arrowup'||k==='w')&&dir.y!==1)nextDir={x:0,y:-1};
  else if((k==='arrowdown'||k==='s')&&dir.y!==-1)nextDir={x:0,y:1};
  else if((k==='arrowleft'||k==='a')&&dir.x!==1)nextDir={x:-1,y:0};
  else if((k==='arrowright'||k==='d')&&dir.x!==-1)nextDir={x:1,y:0};
  e.preventDefault();
});

let touchStartX,touchStartY;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state!=='playing')return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){return}
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0&&dir.x!==-1)nextDir={x:1,y:0};
    else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0};
  }else{
    if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};
    else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1};
  }
},{passive:false});

state='menu';
init();
draw();
</script>
</body>
</html>

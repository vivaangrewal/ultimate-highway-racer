<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Survival</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;height:100vh}
#topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;padding:8px 16px;z-index:10;background:rgba(10,10,26,0.85);border-bottom:1px solid #222}
#backBtn{color:#0ff;text-decoration:none;font-size:16px;font-weight:bold;padding:4px 10px;border:1px solid #0ff;border-radius:4px;transition:0.2s}
#backBtn:hover{background:#0ff;color:#0a0a1a}
#stats{margin-left:auto;display:flex;gap:16px;font-size:13px}
#stats span{color:#ff0}
canvas{display:block;flex:1}
#menu,#gameover,#levelup{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.95);z-index:20}
#gameover,#levelup{display:none}
h1{font-size:48px;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:10px}
.subtitle{color:#888;margin-bottom:30px;font-size:14px}
.btn{padding:12px 36px;font-size:18px;border:2px solid #0ff;background:transparent;color:#0ff;border-radius:6px;cursor:pointer;margin:8px;transition:0.2s;font-family:inherit}
.btn:hover{background:#0ff;color:#0a0a1a}
.go-score{font-size:28px;color:#ff0;margin:16px 0}
.go-info{color:#aaa;margin-bottom:20px;font-size:14px}
.upgrade-btn{padding:14px 30px;font-size:16px;border:2px solid #0f0;background:transparent;color:#0f0;border-radius:8px;cursor:pointer;margin:6px;transition:0.2s;font-family:inherit;text-align:left;min-width:240px}
.upgrade-btn:hover{background:#0f0;color:#0a0a1a}
.upgrade-btn .up-title{font-weight:bold;margin-bottom:4px}
.upgrade-btn .up-desc{font-size:12px;opacity:0.8}
</style>
</head>
<body>
<div id="topbar">
  <a href="../" id="backBtn">← BACK</a>
  <div id="stats">
    <span>Wave: <b id="waveDisplay">1</b></span>
    <span>Kills: <b id="killDisplay">0</b></span>
    <span>XP: <b id="xpDisplay">0</b></span>
    <span>HP: <b id="hpDisplay">100</b></span>
  </div>
</div>
<canvas id="game"></canvas>

<div id="menu">
  <h1>ZOMBIE SURVIVAL</h1>
  <div class="subtitle">How long can you survive?</div>
  <button class="btn" onclick="startGame()">START GAME</button>
  <div style="color:#666;margin-top:20px;font-size:12px">WASD to move · Auto-shoot nearest zombie · Collect XP</div>
</div>

<div id="gameover">
  <h1 style="color:#f44">YOU DIED</h1>
  <div class="go-score">Score: <span id="finalScore">0</span></div>
  <div class="go-info">Wave: <span id="finalWave">1</span> · Kills: <span id="finalKills">0</span></div>
  <button class="btn" onclick="startGame()">RESTART</button>
  <button class="btn" onclick="location.href='../'">HUB</button>
</div>

<div id="levelup">
  <h1 style="color:#ff0;font-size:32px">LEVEL UP!</h1>
  <div style="color:#aaa;margin:12px 0;font-size:14px">Choose an upgrade</div>
  <div id="upgrades"></div>
</div>

<script>
const C=document.getElementById('game'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

const keys={};
addEventListener('keydown',e=>keys[e.code]=true);
addEventListener('keyup',e=>keys[e.code]=false);

let touchDx=0,touchDy=0,touching=false;
let joyX=0,joyY=0,joySX=0,joySY=0;
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];joySX=t.clientX;joySY=t.clientY;joyX=t.clientX;joyY=t.clientY;touching=true});
C.addEventListener('touchmove',e=>{const t=e.touches[0];joyX=t.clientX;joyY=t.clientY});
C.addEventListener('touchend',()=>touching=false);

let state='menu',score=0,wave=1,kills=0,xp=0,xpNeeded=20,level=1;
let player,zombies,bullets,xpOrbs,particles;
let shootTimer=0,waveTimer=0,zSpawnTimer=0;
let dmgUp=0,speedUp=0,regenUp=0,regenTimer=0;

const UPGRADES=[
  {title:'Speed Boost',desc:'+20% movement speed',fn:()=>{speedUp+=0.2}},
  {title:'Damage Up',desc:'+1 bullet damage',fn:()=>{dmgUp++}},
  {title:'Health Regen',desc:'Regen 1 HP/sec',fn:()=>{regenUp++}},
  {title:'Max HP +25',desc:'Increase max health',fn:()=>{player.maxHp+=25;player.hp+=25}},
  {title:'Fire Rate',desc:'Faster shooting',fn:()=>{player.fireRate=Math.max(3,player.fireRate-2)}},
];

function startGame(){
  score=0;wave=1;kills=0;xp=0;xpNeeded=20;level=1;dmgUp=0;speedUp=0;regenUp=0;regenTimer=0;
  player={x:W/2,y:H/2,hp:100,maxHp:100,sp:3,fireRate:8};
  zombies=[];bullets=[];xpOrbs=[];particles=[];
  shootTimer=0;waveTimer=0;zSpawnTimer=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('levelup').style.display='none';
  state='playing';
}

function gameOver(){
  state='gameover';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalWave').textContent=wave;
  document.getElementById('finalKills').textContent=kills;
  document.getElementById('gameover').style.display='flex';
}

function showLevelUp(){
  state='levelup';
  const cont=document.getElementById('upgrades');cont.innerHTML='';
  const opts=[...UPGRADES].sort(()=>Math.random()-0.5).slice(0,3);
  for(const u of opts){
    const btn=document.createElement('button');btn.className='upgrade-btn';
    btn.innerHTML=`<div class="up-title">${u.title}</div><div class="up-desc">${u.desc}</div>`;
    btn.onclick=()=>{u.fn();document.getElementById('levelup').style.display='none';state='playing'};
    cont.appendChild(btn);
  }
  document.getElementById('levelup').style.display='flex';
}

function spawnZombie(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=-20;y=Math.random()*H}
  else if(side===1){x=W+20;y=Math.random()*H}
  else if(side===2){x=Math.random()*W;y=-20}
  else{x=Math.random()*W;y=H+20}
  const hp=2+Math.floor(wave/3);
  zombies.push({x,y,hp,maxHp:hp,sp:0.8+Math.random()*0.5+wave*0.05});
}

function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:20+Math.random()*15,col,r:Math.random()*3+1});
}

function update(){
  if(state!=='playing')return;
  waveTimer++;

  // regen
  if(regenUp>0){regenTimer++;if(regenTimer%60===0)player.hp=Math.min(player.maxHp,player.hp+regenUp)}

  // player movement
  let dx=0,dy=0;
  if(keys['KeyW']||keys['ArrowUp'])dy=-1;
  if(keys['KeyS']||keys['ArrowDown'])dy=1;
  if(keys['KeyA']||keys['ArrowLeft'])dx=-1;
  if(keys['KeyD']||keys['ArrowRight'])dx=1;
  if(touching){
    const jdx=joyX-joySX,jdy=joyY-joySY;
    const jlen=Math.hypot(jdx,jdy);
    if(jlen>20){dx=jdx/jlen;dy=jdy/jlen}
  }
  const spd=player.sp*(1+speedUp);
  player.x+=dx*spd;player.y+=dy*spd;
  player.x=Math.max(16,Math.min(W-16,player.x));
  player.y=Math.max(16,Math.min(H-16,player.y));

  // wave
  if(waveTimer%1200===0)wave++;
  zSpawnTimer++;
  if(zSpawnTimer%Math.max(5,30-wave*2)===0&&zombies.length<10+wave*3)spawnZombie();

  // auto shoot nearest
  if(shootTimer>0)shootTimer--;
  if(shootTimer<=0&&zombies.length>0){
    let nearest=null,nd=Infinity;
    for(const z of zombies){
      const d=Math.hypot(z.x-player.x,z.y-player.y);
      if(d<nd){nd=d;nearest=z}
    }
    if(nearest&&nd<300){
      const angle=Math.atan2(nearest.y-player.y,nearest.x-player.x);
      bullets.push({x:player.x,y:player.y,vx:Math.cos(angle)*8,vy:Math.sin(angle)*8,dmg:1+dmgUp,life:60});
      shootTimer=player.fireRate;
    }
  }

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){bullets.splice(i,1);continue}
    for(let j=zombies.length-1;j>=0;j--){
      const z=zombies[j];
      if(Math.hypot(b.x-z.x,b.y-z.y)<16){
        z.hp-=b.dmg;bullets.splice(i,1);spawnParts(z.x,z.y,'#f44',3);
        if(z.hp<=0){
          spawnParts(z.x,z.y,'#0f0',8);
          xpOrbs.push({x:z.x,y:z.y,life:300});
          zombies.splice(j,1);kills++;score+=10;
        }
        break;
      }
    }
  }

  // zombies
  for(let i=zombies.length-1;i>=0;i--){
    const z=zombies[i];
    const angle=Math.atan2(player.y-z.y,player.x-z.x);
    z.x+=Math.cos(angle)*z.sp;z.y+=Math.sin(angle)*z.sp;
    if(Math.hypot(z.x-player.x,z.y-player.y)<18){
      player.hp-=5;spawnParts(player.x,player.y,'#f44',5);
      zombies.splice(i,1);
      if(player.hp<=0){gameOver();return}
    }
  }

  // xp orbs
  for(let i=xpOrbs.length-1;i>=0;i--){
    const o=xpOrbs[i];o.life--;
    if(o.life<=0){xpOrbs.splice(i,1);continue}
    if(Math.hypot(o.x-player.x,o.y-player.y)<30){
      xp+=5;score+=5;
      if(xp>=xpNeeded){xp-=xpNeeded;xpNeeded=Math.floor(xpNeeded*1.5);level++;showLevelUp()}
      xpOrbs.splice(i,1);
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.9;p.vy*=0.9;
    if(p.life<=0)particles.splice(i,1);
  }

  document.getElementById('waveDisplay').textContent=wave;
  document.getElementById('killDisplay').textContent=kills;
  document.getElementById('xpDisplay').textContent=`${xp}/${xpNeeded}`;
  document.getElementById('hpDisplay').textContent=Math.max(0,player.hp);
}

function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  if(state!=='playing'&&state!=='gameover')return;

  // ground dots
  X.fillStyle='#151525';
  for(let x=0;x<W;x+=40)for(let y=0;y<H;y+=40){X.fillRect(x,y,1,1)}

  // xp orbs
  for(const o of xpOrbs){
    X.globalAlpha=o.life%10<5?1:0.5;
    X.fillStyle='#0f0';X.beginPath();X.arc(o.x,o.y,5,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // zombies
  for(const z of zombies){
    X.fillStyle='#4a4';
    X.beginPath();X.arc(z.x,z.y,12,0,Math.PI*2);X.fill();
    X.fillStyle='#0a0';X.fillRect(z.x-4,z.y-3,3,3);X.fillRect(z.x+2,z.y-3,3,3);
    // hp bar
    if(z.hp<z.maxHp){
      X.fillStyle='#300';X.fillRect(z.x-12,z.y-18,24,3);
      X.fillStyle='#f00';X.fillRect(z.x-12,z.y-18,24*(z.hp/z.maxHp),3);
    }
  }

  // bullets
  for(const b of bullets){
    X.fillStyle='#ff0';X.shadowColor='#ff0';X.shadowBlur=6;
    X.beginPath();X.arc(b.x,b.y,3,0,Math.PI*2);X.fill();
  }
  X.shadowBlur=0;

  // player
  X.fillStyle='#0cf';
  X.beginPath();X.arc(player.x,player.y,14,0,Math.PI*2);X.fill();
  X.fillStyle='#08a';X.beginPath();X.arc(player.x,player.y,8,0,Math.PI*2);X.fill();
  // hp bar
  X.fillStyle='#300';X.fillRect(player.x-18,player.y-24,36,4);
  X.fillStyle='#0f0';X.fillRect(player.x-18,player.y-24,36*(player.hp/player.maxHp),4);

  // particles
  for(const p of particles){
    X.globalAlpha=p.life/30;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // joystick hint
  if(touching){
    X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=2;
    X.beginPath();X.arc(joySX,joySY,50,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.arc(joyX,joyY,16,0,Math.PI*2);X.fill();
  }
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#back{position:fixed;top:12px;left:12px;color:#0ff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid #0ff;border-radius:4px;z-index:100;transition:.2s}
#back:hover{background:#0ff;color:#0a0a1a}
#header{text-align:center;margin-bottom:10px}
#header h1{font-size:36px;color:#edc22e;text-shadow:0 0 20px rgba(237,194,46,0.5)}
.score-row{display:flex;gap:20px;justify-content:center;margin-top:8px}
.score-box{background:rgba(255,255,255,0.08);border-radius:6px;padding:6px 20px;text-align:center}
.score-box .label{font-size:11px;color:#aaa;text-transform:uppercase}
.score-box .val{font-size:22px;font-weight:bold;color:#edc22e}
#board-container{position:relative}
#board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px;background:rgba(255,255,255,0.06);border-radius:8px;touch-action:none}
.tile{width:70px;height:70px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;transition:all .12s;background:rgba(255,255,255,0.05);color:#eee}
.tile.empty{background:rgba(255,255,255,0.03);color:transparent}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.9);border-radius:8px;z-index:10}
.overlay.hidden{display:none}
.overlay h2{font-size:32px;margin-bottom:10px}
.btn{margin-top:14px;padding:12px 36px;font-size:18px;border:2px solid #edc22e;background:transparent;color:#edc22e;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit}
.btn:hover{background:#edc22e;color:#0a0a1a}
.win-color{color:#ff0;text-shadow:0 0 20px #ff0}
.lose-color{color:#f44;text-shadow:0 0 20px #f44}
</style>
</head>
<body>
<a href="../" id="back">← BACK</a>
<div id="header">
<h1>2048</h1>
<div class="score-row">
<div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
<div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
</div>
</div>
<div id="board-container">
<div id="board"></div>
<div class="overlay hidden" id="win-overlay">
<h2 class="win-color">YOU WIN!</h2>
<p style="color:#aaa">You reached 2048!</p>
<button class="btn" id="keep-btn">Keep Playing</button>
<button class="btn" id="newgame-btn-win">New Game</button>
</div>
<div class="overlay hidden" id="lose-overlay">
<h2 class="lose-color">GAME OVER</h2>
<p style="color:#aaa">No more moves available</p>
<button class="btn" id="newgame-btn-lose">New Game</button>
</div>
</div>
<script>
const boardEl=document.getElementById('board');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const winOverlay=document.getElementById('win-overlay');
const loseOverlay=document.getElementById('lose-overlay');

let grid,score,best=parseInt(localStorage.getItem('2048best'))||0,won=false,keepPlaying=false;
bestEl.textContent=best;

const tileColors={
  2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',
  64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'
};

function init(){
  grid=Array.from({length:4},()=>[0,0,0,0]);
  score=0;won=false;keepPlaying=false;
  scoreEl.textContent='0';
  winOverlay.classList.add('hidden');
  loseOverlay.classList.add('hidden');
  addRandom();addRandom();
  render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push({r,c});
  if(empty.length===0)return;
  const{r,c}=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render(){
  boardEl.innerHTML='';
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const v=grid[r][c];
      const d=document.createElement('div');
      d.className='tile'+(v===0?' empty':'');
      d.textContent=v||'';
      if(v){
        d.style.background=tileColors[Math.min(v,2048)]||'#3c3a32';
        d.style.color=v<=4?'#776e65':'#f9f6f2';
        d.style.fontSize=v>=1024?'18px':v>=128?'22px':'24px';
      }
      boardEl.appendChild(d);
    }
  }
}

function slide(row){
  let a=row.filter(x=>x);
  let merged=false;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){
      a[i]*=2;score+=a[i];a.splice(i+1,1);merged=true;
      if(a[i]===2048&&!won&&!keepPlaying)won=true;
    }
  }
  while(a.length<4)a.push(0);
  return a;
}

function move(dir){
  let moved=false;
  const prev=grid.map(r=>[...r]);
  if(dir==='left'){
    for(let r=0;r<4;r++){grid[r]=slide(grid[r]);if(grid[r].join(',')!==prev[r].join(','))moved=true}
  }else if(dir==='right'){
    for(let r=0;r<4;r++){grid[r]=slide(grid[r].slice()).reverse();grid[r].reverse();if(grid[r].join(',')!==prev[r].join(','))moved=true}
  }else if(dir==='up'){
    for(let c=0;c<4;c++){
      let col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];
      col=slide(col);
      for(let r=0;r<4;r++)grid[r][c]=col[r];
      if(col.join(',')!==`${prev[0][c]},${prev[1][c]},${prev[2][c]},${prev[3][c]}`)moved=true;
    }
  }else if(dir==='down'){
    for(let c=0;c<4;c++){
      let col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];
      col=slide(col);
      for(let r=0;r<4;r++)grid[r][c]=col[3-r];
      if(col.join(',')!==`${prev[3][c]},${prev[2][c]},${prev[1][c]},${prev[0][c]}`)moved=true;
    }
  }
  if(moved){
    addRandom();
    scoreEl.textContent=score;
    if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('2048best',best)}
    render();
    if(won){winOverlay.classList.remove('hidden');won=false}
    else if(isGameOver())loseOverlay.classList.remove('hidden');
  }
}

function isGameOver(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(grid[r][c]===0)return false;
    if(c<3&&grid[r][c]===grid[r][c+1])return false;
    if(r<3&&grid[r][c]===grid[r+1][c])return false;
  }
  return true;
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){e.preventDefault();move(map[e.key])}
});

let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});

document.getElementById('keep-btn').addEventListener('click',()=>{keepPlaying=true;winOverlay.classList.add('hidden')});
document.getElementById('newgame-btn-win').addEventListener('click',init);
document.getElementById('newgame-btn-lose').addEventListener('click',init);

init();
</script>
</body>
</html>

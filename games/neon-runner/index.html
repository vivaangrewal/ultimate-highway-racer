<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center}
#backLink{position:fixed;top:10px;left:10px;z-index:100;color:#f0f;text-decoration:none;font-size:16px;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:8px;border:1px solid #f0f}
#backLink:hover{background:#f0f;color:#0a0a1a}
canvas{display:block}

.touchBtn:active{background:rgba(255,0,255,0.3)}
@media(pointer:coarse){#mobileControls{display:flex}}
</style>
</head>

function initLevel(){
let lv=levels[currentLevel];
player={x:80,y:H-100,w:24,h:36,vx:0,vy:0,onGround:false,facing:1,health:3};
platforms=lv.platforms.map(p=>({...p}));
spikes=lv.spikes.map(s=>({...s}));
enemies=lv.enemies.map(e=>({...e,dir:1}));
gems=lv.gems.map(g=>({...g,collected:false,bobPhase:Math.random()*Math.PI*2}));
camX=0;camY=0;health=3;
updateHUD();
}

function updateHUD(){
document.getElementById('levelDisplay').textContent='Level '+(currentLevel+1);
document.getElementById('gemDisplay').textContent='Gems: '+gemsCollected;
document.getElementById('scoreDisplay').textContent='Score: '+score;
}

function update(){
if(gameState!=='playing')return;
let p=player;
// Movement
if(keys['arrowleft']||keys['a']){p.vx=-MOVE_SPEED;p.facing=-1}
else if(keys['arrowright']||keys['d']){p.vx=MOVE_SPEED;p.facing=1}
else p.vx*=0.8;
// Jump
let wantJump=keys['arrowup']||keys['w']||keys[' ']||keys['space'];
if(wantJump&&p.onGround){p.vy=JUMP_FORCE;p.onGround=false;jumpHeld=true}
if(!wantJump)jumpHeld=false;
if(jumpHeld&&p.vy<0)p.vy+=0.1;
// Gravity
p.vy+=GRAVITY;
p.x+=p.vx;p.y+=p.vy;
// Platform collisions
p.onGround=false;
platforms.forEach(pl=>{
if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+15&&p.vy>=0){
p.y=pl.y-p.h;p.vy=0;p.onGround=true;
}
});
// Wall collisions
if(p.x<0)p.x=0;
// Camera
camX=Math.max(0,p.x-W/3);
camY=0;
// Gems
gems.forEach(g=>{
if(!g.collected){
g.bobPhase+=0.05;
let gy=g.y+Math.sin(g.bobPhase)*4;
if(Math.abs(p.x+p.w/2-g.x)<20&&Math.abs(p.y+p.h/2-gy)<20){
g.collected=true;gemsCollected++;score+=100;updateHUD();
}
}
});
// Spikes
spikes.forEach(s=>{
if(p.x+p.w>s.x&&p.x<s.x+s.w&&p.y+p.h>s.y&&p.y<s.y+s.h){
p.x=80;p.y=H-100;p.vy=0;health--;updateHUD();
if(health<=0)gameState='over';
}
});
// Enemies
enemies.forEach(e=>{
e.x+=e.speed*e.dir;
if(e.x>e.startX+e.range||e.x<e.startX-e.range)e.dir*=-1;
if(p.x+p.w>e.x&&p.x<e.x+e.w&&p.y+p.h>e.y&&p.y<e.y+e.w){
if(p.vy>0&&p.y+p.h<e.y+e.w/2){score+=200;e.x=-1000;e.speed=0}
else{p.x=80;p.y=H-100;p.vy=0;health--;updateHUD();if(health<=0)gameState='over'}
}
});
// Finish
let lv=levels[currentLevel];
let f=lv.finish;
if(p.x+p.w>f.x&&p.x<f.x+f.w&&p.y+p.h>f.y&&p.y<f.y+f.h){
if(currentLevel<4){
currentLevel++;
document.getElementById('levelScreen').style.display='flex';
document.getElementById('levelTitle').textContent='Level '+(currentLevel+1)+': '+levels[currentLevel].name;
document.getElementById('levelInfo').textContent='Gems: '+gemsCollected+' | Score: '+score;
}else{
gameState='over';showGameOver();
}
}
updateHUD();
}

function draw(){
ctx.clearRect(0,0,W,H);
if(gameState!=='playing')return;
let lv=levels[currentLevel];
ctx.fillStyle=lv.bg;ctx.fillRect(0,0,W,H);
// Grid background
ctx.strokeStyle='rgba(255,0,255,0.05)';ctx.lineWidth=1;
for(let x=-camX%50;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

ctx.save();ctx.translate(-camX,-camY);
// Platforms
platforms.forEach(p=>{
ctx.fillStyle='#222';ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.strokeStyle='#f0f';ctx.lineWidth=2;ctx.strokeRect(p.x,p.y,p.w,p.h);
ctx.shadowColor='#f0f';ctx.shadowBlur=10;ctx.strokeRect(p.x,p.y,p.w,p.h);ctx.shadowBlur=0;
});
// Spikes
ctx.fillStyle='#f44';
spikes.forEach(s=>{
for(let i=0;i<s.w;i+=12){
ctx.beginPath();ctx.moveTo(s.x+i,s.y+s.h);ctx.lineTo(s.x+i+6,s.y);ctx.lineTo(s.x+i+12,s.y+s.h);ctx.fill();
}
ctx.shadowColor='#f44';ctx.shadowBlur=8;
ctx.fill();ctx.shadowBlur=0;
});
// Gems
gems.forEach(g=>{
if(g.collected)return;
let gy=g.y+Math.sin(g.bobPhase)*4;
ctx.save();ctx.translate(g.x,gy);
ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';ctx.shadowBlur=12;
ctx.beginPath();
for(let i=0;i<5;i++){let a=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(Math.cos(a)*10,Math.sin(a)*10);
let a2=a+Math.PI/5;ctx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5)}
ctx.closePath();ctx.fill();ctx.shadowBlur=0;
ctx.restore();
});
// Enemies
enemies.forEach(e=>{
if(e.speed===0)return;
ctx.fillStyle='#f44';ctx.shadowColor='#f44';ctx.shadowBlur=8;
ctx.fillRect(e.x,e.y,e.w,e.h);ctx.shadowBlur=0;
// Eyes
ctx.fillStyle='#fff';
ctx.fillRect(e.x+6,e.y+6,6,6);ctx.fillRect(e.x+18,e.y+6,6,6);
ctx.fillStyle='#000';
ctx.fillRect(e.x+8,e.y+8,3,3);ctx.fillRect(e.x+20,e.y+8,3,3);
});
// Player
let p=player;
ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);
ctx.scale(p.facing,1);
// Body glow
ctx.shadowColor='#f0f';ctx.shadowBlur=15;
ctx.fillStyle='#f0f';
ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
ctx.shadowBlur=0;
// Face
ctx.fillStyle='#fff';
ctx.fillRect(4,-p.h/2+6,6,6);
ctx.fillRect(4,-p.h/2+16,6,4);
// Legs animation
if(!p.onGround){
ctx.fillStyle='#d0d';
ctx.fillRect(-p.w/2+2,p.h/2-4,8,4);
ctx.fillRect(p.w/2-10,p.h/2-4,8,4);
}else if(Math.abs(p.vx)>0.5){
let legOff=Math.sin(Date.now()*0.01)*4;
ctx.fillStyle='#d0d';
ctx.fillRect(-p.w/2+2,p.h/2+legOff,8,4);
ctx.fillRect(p.w/2-10,p.h/2-legOff,8,4);
}else{
ctx.fillStyle='#d0d';
ctx.fillRect(-p.w/2+2,p.h/2,8,4);
ctx.fillRect(p.w/2-10,p.h/2,8,4);
}
ctx.restore();
// Finish flag
let f=lv.finish;
ctx.fillStyle='#4f4';ctx.shadowColor='#4f4';ctx.shadowBlur=15;
ctx.fillRect(f.x,f.y,f.w,f.h);ctx.shadowBlur=0;
ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
ctx.fillText('EXIT',f.x+f.w/2,f.y+f.h/2+6);
ctx.restore();
// Health bar
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(10,50,150,16);
ctx.fillStyle='#f44';ctx.fillRect(10,50,150*(health/3),16);
ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(10,50,150,16);
}

function gameLoop(){
if(gameState==='playing')update();
draw();
requestAnimationFrame(gameLoop);
}

function showGameOver(){
document.getElementById('gameOverScreen').style.display='flex';
document.getElementById('finalScore').textContent=score;
document.getElementById('finalStats').textContent='Level: '+(currentLevel+1)+' | Gems: '+gemsCollected;
}

function startGame(){
document.getElementById('startScreen').style.display='none';
document.getElementById('gameOverScreen').style.display='none';
document.getElementById('levelScreen').style.display='none';
currentLevel=0;score=0;gemsCollected=0;initLevel();gameState='playing';
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
document.getElementById('continueBtn').addEventListener('click',()=>{
document.getElementById('levelScreen').style.display='none';initLevel();
});

// Touch
document.getElementById('tl').addEventListener('touchstart',e=>{e.preventDefault();keys['arrowleft']=true});

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jump Hero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;height:100vh}
#topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;padding:8px 16px;z-index:10;background:rgba(10,10,26,0.85);border-bottom:1px solid #222}
#backBtn{color:#0ff;text-decoration:none;font-size:16px;font-weight:bold;padding:4px 10px;border:1px solid #0ff;border-radius:4px;transition:0.2s}
#backBtn:hover{background:#0ff;color:#0a0a1a}
#stats{margin-left:auto;display:flex;gap:18px;font-size:14px}
#stats span{color:#ff0}
canvas{display:block;flex:1}
#menu,#gameover{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.95);z-index:20}
#gameover{display:none}
h1{font-size:48px;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:10px}
.subtitle{color:#888;margin-bottom:30px;font-size:14px}
.btn{padding:12px 36px;font-size:18px;border:2px solid #0ff;background:transparent;color:#0ff;border-radius:6px;cursor:pointer;margin:8px;transition:0.2s;font-family:inherit}
.btn:hover{background:#0ff;color:#0a0a1a}
.go-score{font-size:28px;color:#ff0;margin:16px 0}
.go-info{color:#aaa;margin-bottom:20px;font-size:14px}
</style>
</head>
<body>
<div id="topbar">
  <a href="../" id="backBtn">← BACK</a>
  <div id="stats">
    <span>Score: <b id="scoreDisplay">0</b></span>
    <span>Coins: <b id="coinDisplay">0</b></span>
    <span>Distance: <b id="distDisplay">0</b>m</span>
  </div>
</div>
<canvas id="game"></canvas>

<div id="menu">
  <h1>JUMP HERO</h1>
  <div class="subtitle">How high can you go?</div>
  <button class="btn" onclick="startGame()">START GAME</button>
  <div style="color:#666;margin-top:20px;font-size:12px">Tap / SPACE / UP to jump · Double jump in air</div>
</div>

<div id="gameover">
  <h1 style="color:#f44">GAME OVER</h1>
  <div class="go-score">Score: <span id="finalScore">0</span></div>
  <div class="go-info">Coins: <span id="finalCoins">0</span> · Distance: <span id="finalDist">0</span>m</div>
  <button class="btn" onclick="startGame()">RESTART</button>
  <button class="btn" onclick="location.href='../'">HUB</button>
</div>

<script>
const C=document.getElementById('game'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

let state='menu',score=0,coins=0,distance=0,highScore=0;
let player,platforms,coinItems,particles;
let camY=0,maxHeight=0,platformSpeed=1,frame=0;
const grav=0.5,jumpForce=-12;

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'||e.code==='ArrowUp')e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});
C.addEventListener('touchstart',e=>{e.preventDefault();jump()});
C.addEventListener('mousedown',()=>jump());

function jump(){
  if(state!=='playing')return;
  if(player.grounded){player.vy=jumpForce;player.grounded=false;player.jumps=1}
  else if(player.jumps<2){player.vy=jumpForce*0.9;player.jumps=2;spawnParts(player.x,player.y+10,'#ff0',5)}
}

function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:Math.random()*-3,life:20+Math.random()*10,col,r:Math.random()*3+1});
}

function genPlat(y){
  const w=60+Math.random()*80;
  const x=Math.random()*(W-w);
  const hasCoin=Math.random()<0.3;
  return{x,y,w,h:12,hasCoin,coinY:y-20};
}

function startGame(){
  score=0;coins=0;distance=0;camY=0;maxHeight=0;frame=0;platformSpeed=1;
  player={x:W/2,y:H-100,vy:0,w:20,h:20,grounded:true,jumps:0};
  platforms=[];coinItems=[];particles=[];
  platforms.push({x:W/2-40,y:H-60,w:80,h:12,hasCoin:false});
  for(let i=1;i<20;i++)platforms.push(genPlat(H-60-i*50));
  document.getElementById('menu').style.display='none';
  document.getElementById('gameover').style.display='none';
  state='playing';
}

function gameOver(){
  state='gameover';
  if(score>highScore)highScore=score;
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalCoins').textContent=coins;
  document.getElementById('finalDist').textContent=Math.floor(distance);
  document.getElementById('gameover').style.display='flex';
}

function update(){
  if(state!=='playing')return;
  frame++;

  // input
  if(keys['ArrowLeft']||keys['KeyA'])player.x-=4;
  if(keys['ArrowRight']||keys['KeyD'])player.x+=4;
  if(keys['Space']||keys['ArrowUp']||keys['KeyW']){if(!keys._jumpHeld){jump();keys._jumpHeld=true}}
  else keys._jumpHeld=false;

  // gravity
  player.vy+=grav;player.y+=player.vy;

  // wrap screen
  if(player.x<-player.w)player.x=W;
  if(player.x>W)player.x=0;

  // camera
  const targetCam=player.y-H*0.4;
  if(targetCam<camY)camY=targetCam;
  const worldY=player.y+camY;

  // generate platforms
  let topPlat=Infinity;
  for(const p of platforms)if(p.y<topPlat)topPlat=p.y;
  while(topPlat>camY-200){
    const ny=topPlat-45-Math.random()*30;
    platforms.push(genPlat(ny));
    topPlat=ny;
  }

  // remove old
  for(let i=platforms.length-1;i>=0;i--)if(platforms[i].y>camY+H+50)platforms.splice(i,1);

  // collision
  player.grounded=false;
  if(player.vy>0){
    for(const p of platforms){
      const px=player.x,py=player.y+player.h/2;
      const prevY=py-player.vy;
      if(px>p.x-10&&px<p.x+p.w+10&&py>=p.y&&prevY<=p.y+4){
        player.y=p.y-player.h/2;player.vy=0;player.grounded=true;player.jumps=0;
        spawnParts(player.x,player.y+player.h/2,'#0ff',3);
        if(p.hasCoin){coins++;score+=10;spawnParts(p.x+p.w/2,p.y-10,'#ff0',8);p.hasCoin=false}
      }
    }
  }

  // score
  if(player.y<maxHeight){maxHeight=player.y;score=Math.max(score,Math.floor(-maxHeight/10));distance=Math.floor(-maxHeight/20)}

  // game over
  if(player.y>camY+H+50)gameOver();

  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('coinDisplay').textContent=coins;
  document.getElementById('distDisplay').textContent=Math.floor(distance);
}

function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  if(state!=='playing'&&state!=='gameover')return;

  X.save();X.translate(0,-camY);

  // platforms
  for(const p of platforms){
    const gradient=X.createLinearGradient(p.x,p.y,p.x+p.w,p.y);
    gradient.addColorStop(0,'#0a6');gradient.addColorStop(1,'#0cf');
    X.fillStyle=gradient;
    X.beginPath();X.roundRect(p.x,p.y,p.w,p.h,4);X.fill();
    X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(p.x+2,p.y+1,p.w-4,3);
    if(p.hasCoin){
      X.fillStyle='#ff0';X.beginPath();X.arc(p.x+p.w/2,p.y-12,6,0,Math.PI*2);X.fill();
      X.fillStyle='#a80';X.font='bold 8px sans-serif';X.textAlign='center';X.fillText('$',p.x+p.w/2,p.y-9);
    }
  }

  // player
  X.fillStyle='#0ff';
  X.beginPath();X.roundRect(player.x-player.w/2,player.y-player.h/2,player.w,player.h,4);X.fill();
  // eyes
  X.fillStyle='#0a0a1a';
  X.fillRect(player.x-5,player.y-4,3,3);X.fillRect(player.x+2,player.y-4,3,3);

  // particles
  for(const p of particles){
    X.globalAlpha=p.life/30;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  X.restore();
}

function loop(){update();draw();for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>

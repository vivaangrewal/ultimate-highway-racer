<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Cards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#back{position:fixed;top:12px;left:12px;color:#0ff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid #0ff;border-radius:4px;z-index:100;transition:.2s}
#back:hover{background:#0ff;color:#0a0a1a}
#header{text-align:center;margin-bottom:10px}
#header h1{font-size:28px;color:#e040e0;text-shadow:0 0 20px rgba(224,64,224,0.5)}
.stats{display:flex;gap:24px;justify-content:center;margin-top:8px}
.stat{background:rgba(255,255,255,0.06);padding:6px 18px;border-radius:6px;text-align:center}
.stat .label{font-size:11px;color:#aaa;text-transform:uppercase}
.stat .val{font-size:20px;font-weight:bold;color:#e040e0}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:360px;width:90vw}
.card{
  aspect-ratio:1;border-radius:10px;cursor:pointer;position:relative;
  perspective:600px;user-select:none;-webkit-tap-highlight-color:transparent
}
.card-inner{
  width:100%;height:100%;position:relative;transition:transform .4s;transform-style:preserve-3d
}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;backface-visibility:hidden;-webkit-backface-visibility:hidden
}
.card-front{
  background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);font-size:28px;color:#555
}
.card-back{
  background:linear-gradient(135deg,#e040e0,#8020c0);transform:rotateY(180deg);font-size:32px
}
.card.matched .card-back{
  background:linear-gradient(135deg,#40c040,#208020);animation:pulse .5s
}
@keyframes pulse{0%,100%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.1)}}
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,26,0.92);z-index:50
}
.overlay.hidden{display:none}
.overlay h2{font-size:32px;color:#e040e0;text-shadow:0 0 20px #e040e0;margin-bottom:10px}
.overlay p{font-size:16px;color:#aaa;margin:4px 0}
.overlay .big{font-size:48px;color:#ff0;margin:10px 0;text-shadow:0 0 20px #ff0}
.btn{margin-top:14px;padding:12px 36px;font-size:18px;border:2px solid #e040e0;background:transparent;color:#e040e0;border-radius:6px;cursor:pointer;transition:.2s;font-family:inherit}
.btn:hover{background:#e040e0;color:#0a0a1a}
</style>
</head>
<body>
<a href="../" id="back">← BACK</a>
<div id="header">
<h1>MEMORY CARDS</h1>
<div class="stats">
<div class="stat"><div class="label">Moves</div><div class="val" id="moves">0</div></div>
<div class="stat"><div class="label">Time</div><div class="val" id="timer">0:00</div></div>
<div class="stat"><div class="label">Pairs</div><div class="val" id="pairs">0/8</div></div>
</div>
</div>
<div id="grid"></div>
<div class="overlay" id="start-overlay">
<h2>MEMORY CARDS</h2>
<p>Find all matching pairs!</p>
<p>Tap a card to flip it</p>
<button class="btn" id="start-btn">START</button>
</div>
<div class="overlay hidden" id="win-overlay">
<h2>YOU WIN!</h2>
<div class="big" id="final-time">0:00</div>
<p>Time taken</p>
<p id="final-moves">0 moves</p>
<button class="btn" id="restart-btn">PLAY AGAIN</button>
</div>
<script>
const gridEl=document.getElementById('grid');
const movesEl=document.getElementById('moves');
const timerEl=document.getElementById('timer');
const pairsEl=document.getElementById('pairs');
const startOverlay=document.getElementById('start-overlay');
const winOverlay=document.getElementById('win-overlay');
const finalTimeEl=document.getElementById('final-time');
const finalMovesEl=document.getElementById('final-moves');

const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🦄'];
const PAIRS=8;

let cards,flipped,matched,moves,timerInterval,elapsed,locked,gameState;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
  return arr;
}

function init(){
  const chosen=shuffle([...EMOJIS]).slice(0,PAIRS);
  const deck=shuffle([...chosen,...chosen]);
  cards=deck.map((emoji,i)=>({id:i,emoji,flipped:false,matched:false}));
  flipped=[];matched=0;moves=0;elapsed=0;locked=false;gameState='playing';
  movesEl.textContent='0';timerEl.textContent='0:00';pairsEl.textContent='0/'+PAIRS;
  winOverlay.classList.add('hidden');
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    elapsed++;const m=Math.floor(elapsed/60);const s=elapsed%60;
    timerEl.textContent=m+':'+(s<10?'0':'')+s;
  },1000);
  render();
}

function render(){
  gridEl.innerHTML='';
  cards.forEach((card,i)=>{
    const div=document.createElement('div');
    div.className='card'+(card.flipped?' flipped':'')+(card.matched?' matched':'');
    div.innerHTML=`<div class="card-inner">
      <div class="card-face card-front">?</div>
      <div class="card-face card-back">${card.emoji}</div>
    </div>`;
    div.addEventListener('click',()=>flipCard(i));
    gridEl.appendChild(div);
  });
}

function flipCard(i){
  if(locked||gameState!=='playing')return;
  if(cards[i].flipped||cards[i].matched)return;
  cards[i].flipped=true;
  flipped.push(i);
  render();

  if(flipped.length===2){
    moves++;movesEl.textContent=moves;
    locked=true;
    const[a,b]=flipped;
    if(cards[a].emoji===cards[b].emoji){
      cards[a].matched=true;cards[b].matched=true;
      matched++;pairsEl.textContent=matched+'/'+PAIRS;
      flipped=[];locked=false;render();
      if(matched===PAIRS){
        clearInterval(timerInterval);
        const m=Math.floor(elapsed/60);const s=elapsed%60;
        finalTimeEl.textContent=m+':'+(s<10?'0':'')+s;
        finalMovesEl.textContent=moves+' moves';
        gameState='won';
        setTimeout(()=>winOverlay.classList.remove('hidden'),600);
      }
    }else{
      setTimeout(()=>{
        cards[a].flipped=false;cards[b].flipped=false;
        flipped=[];locked=false;render();
      },800);
    }
  }
}

document.getElementById('start-btn').addEventListener('click',()=>{
  startOverlay.classList.add('hidden');init();
});
document.getElementById('restart-btn').addEventListener('click',init);

gameState='menu';
</script>
</body>
</html>

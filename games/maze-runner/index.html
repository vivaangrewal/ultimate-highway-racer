<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maze Runner 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1)}
#topbar a{color:#4fc3f7;text-decoration:none;font-size:14px;font-weight:600}
#topbar a:hover{color:#81d4fa}
#stats{display:flex;gap:20px;font-size:13px;color:#aaa}
#stats span{color:#fff;font-weight:600}
canvas{display:block;touch-action:none;flex:1}
#ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:center;flex-direction:column}
#ov h1{font-size:36px;margin-bottom:10px;color:#4fc3f7}
#ov p{font-size:18px;margin-bottom:20px;color:#ccc;text-align:center;line-height:1.6}
#ov button{padding:12px 36px;font-size:16px;background:#4fc3f7;color:#0a0a1a;border:none;border-radius:8px;cursor:pointer;font-weight:700}
#help{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.4);text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="topbar"><a href="../">&larr; BACK</a><div id="stats">Time: <span id="tm">0:00</span> | Keys: <span id="ky">0</span>/3</div></div>
<canvas id="c"></canvas>
<div id="ov"><h1 id="ot">You Escaped!</h1><p id="om"></p><button onclick="initGame()">Play Again</button></div>
<div id="help">WASD/Arrows: Move | Mouse drag or Left/Right: Look</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
let maze,mazeW=15,mazeH=15;
let px,py,pAngle;
let keys2=0,neededKeys=3,stTime=0,tInt=null,go2=false;
let keyW=false,keyS=false,keyA=false,keyD=false,keyLeft=false,keyRight=false;
let keys3d=[],exitPos=null;
const fov=Math.PI/3;
const WALL_COLORS=['#1a237e','#283593','#1565c0','#0d47a1','#1e88e5'];

function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight-40;cv.style.marginTop='40px';}

function generateMaze(){
  maze=[];
  for(let y=0;y<mazeH;y++){maze[y]=[];for(let x=0;x<mazeW;x++)maze[y][x]=1;}
  function carve(x,y){
    maze[y][x]=0;
    let dirs=[[0,-2],[0,2],[-2,0],[2,0]];
    for(let i=dirs.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
    dirs.forEach(function(dd){
      let nx=x+dd[0],ny=y+dd[1];
      if(nx>0&&nx<mazeW-1&&ny>0&&ny<mazeH-1&&maze[ny][nx]===1){
        maze[y+dd[1]/2][x+dd[0]/2]=0;
        carve(nx,ny);
      }
    });
  }
  carve(1,1);
  px=1.5;py=1.5;pAngle=0;keys2=0;keys3d=[];
  let openCells=[];
  for(let y=1;y<mazeH-1;y++)for(let x=1;x<mazeW-1;x++){
    if(maze[y][x]===0&&!(x===1&&y===1))openCells.push([x,y]);
  }
  for(let i=openCells.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));let tmp=openCells[i];openCells[i]=openCells[j];openCells[j]=tmp;}
  for(let i=0;i<Math.min(3,openCells.length);i++){
    let kx=openCells[i][0],ky=openCells[i][1];
    keys3d.push({x:kx+0.5,y:ky+0.5,collected:false});
  }
  exitPos={x:mazeW-2+0.5,y:mazeH-2+0.5};
  maze[mazeH-2][mazeW-2]=0;
  if(maze[1][2]===1&&maze[2][1]===1){maze[1][2]=0;}
}

function castRayDDA(ox,oy,angle){
  let dx=Math.cos(angle),dy=Math.sin(angle);
  let mapX=Math.floor(ox),mapY=Math.floor(oy);
  let ddx=Math.abs(1/dx),ddy=Math.abs(1/dy);
  let stepX,stepY,sx,sy;
  if(dx<0){stepX=-1;sx=(ox-mapX)*ddx;}
  else{stepX=1;sx=(mapX+1-ox)*ddx;}
  if(dy<0){stepY=-1;sy=(oy-mapY)*ddy;}
  else{stepY=1;sy=(mapY+1-oy)*ddy;}
  let side=0,dist=0;
  for(let i=0;i<100;i++){
    if(sx<sy){sx+=ddx;mapX+=stepX;side=0;}
    else{sy+=ddy;mapY+=stepY;side=1;}
    if(mapX<0||mapX>=mazeW||mapY<0||mapY>=mazeH)break;
    if(maze[mapY][mapX]===1){
      if(side===0)dist=sx-ddx;else dist=sy-ddy;
      if(dist<0.001)dist=0.001;
      return{dist:dist,side:side,mx:mapX,my:mapY};
    }
  }
  return{dist:50,side:0,mx:mapX,my:mapY};
}

function draw(){
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);
  let numRays=Math.min(W,600);
  let stripW=W/numRays;
  for(let i=0;i<numRays;i++){
    let a=pAngle-fov/2+fov*(i/numRays);
    let r=castRayDDA(px,py,a);
    let d=r.dist*Math.cos(a-pAngle);
    if(d<0.001)d=0.001;
    let wallH2=H/(d);
    if(wallH2>H*2)wallH2=H*2;
    let cIdx=(r.mx||0)+(r.my||0);
    let wc=WALL_COLORS[Math.abs(cIdx)%WALL_COLORS.length];
    let brightness=r.side===0?1:0.7;
    let shade=Math.max(0.15,1-d/12);
    let r2=parseInt(wc.slice(1,3),16),g=parseInt(wc.slice(3,5),16),b=parseInt(wc.slice(5,7),16);
    cx.fillStyle='rgb('+Math.floor(r2*shade*brightness)+','+Math.floor(g*shade*brightness)+','+Math.floor(b*shade*brightness)+')';
    cx.fillRect(i*stripW,H/2-wallH2/2,stripW+1,wallH2);
  }
  let mapS=Math.min(130,Math.min(W,H)*0.2);
  let cs=mapS/mazeW;
  let mx0=10,my0=10;
  cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(mx0-2,my0-2,mapS+4,mapS+4);
  cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;cx.strokeRect(mx0-2,my0-2,mapS+4,mapS+4);
  for(let y=0;y<mazeH;y++)for(let x=0;x<mazeW;x++){
    cx.fillStyle=maze[y][x]===1?'rgba(100,150,255,0.5)':'rgba(30,30,60,0.3)';
    cx.fillRect(mx0+x*cs,my0+y*cs,cs-0.5,cs-0.5);
  }
  keys3d.forEach(function(k){
    if(!k.collected){
      cx.fillStyle='#ffc107';
      cx.beginPath();cx.arc(mx0+k.x*cs,my0+k.y*cs,cs*0.35,0,Math.PI*2);cx.fill();
    }
  });
  if(exitPos){
    let unlocked=keys2>=neededKeys;
    cx.fillStyle=unlocked?'#00e676':'#ff5252';
    cx.fillRect(mx0+(exitPos.x-0.4)*cs,my0+(exitPos.y-0.4)*cs,cs*0.8,cs*0.8);
  }
  cx.fillStyle='#00e676';
  cx.beginPath();cx.arc(mx0+px*cs,my0+py*cs,cs*0.3,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#fff';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(mx0+px*cs,my0+py*cs);
  cx.lineTo(mx0+px*cs+Math.cos(pAngle)*cs*0.5,my0+py*cs+Math.sin(pAngle)*cs*0.5);
  cx.stroke();
}

function update(){
  if(go2)return;
  let spd=0.04,rot=0.035;
  if(keyLeft)pAngle-=rot;if(keyRight)pAngle+=rot;
  let dx=0,dy=0;
  if(keyW){dx+=Math.cos(pAngle)*spd;dy+=Math.sin(pAngle)*spd;}
  if(keyS){dx-=Math.cos(pAngle)*spd;dy-=Math.sin(pAngle)*spd;}
  if(keyA){dx+=Math.cos(pAngle-Math.PI/2)*spd;dy+=Math.sin(pAngle-Math.PI/2)*spd;}
  if(keyD){dx+=Math.cos(pAngle+Math.PI/2)*spd;dy+=Math.sin(pAngle+Math.PI/2)*spd;}
  let margin=0.2;
  let nx=px+dx,ny=py+dy;
  if(dx!==0){
    let checkX=nx+margin*Math.sign(dx);
    if(checkX>=0&&checkX<mazeW&&maze[Math.floor(py)][Math.floor(checkX)]===0)px=nx;
  }
  if(dy!==0){
    let checkY=ny+margin*Math.sign(dy);
    if(checkY>=0&&checkY<mazeH&&maze[Math.floor(checkY)][Math.floor(px)]===0)py=ny;
  }
  for(let i=0;i<keys3d.length;i++){
    let k=keys3d[i];
    if(!k.collected&&Math.abs(px-k.x)<0.4&&Math.abs(py-k.y)<0.4){k.collected=true;keys2++;}
  }
  document.getElementById('ky').textContent=keys2;
  if(keys2>=neededKeys&&exitPos&&Math.abs(px-exitPos.x)<0.5&&Math.abs(py-exitPos.y)<0.5){
    endGame();
  }
}

function endGame(){
  go2=true;clearInterval(tInt);
  let s=Math.floor((Date.now()-stTime)/1000),m=Math.floor(s/60);s%=60;
  document.getElementById('ot').textContent='You Escaped!';
  document.getElementById('om').textContent='Time: '+m+':'+(s<10?'0':'')+s+'<br>Keys collected: '+keys2+'/'+neededKeys;
  document.getElementById('ov').style.display='flex';
}

function updateTimer(){
  if(go2)return;
  let s=Math.floor((Date.now()-stTime)/1000),m=Math.floor(s/60);s%=60;
  document.getElementById('tm').textContent=m+':'+(s<10?'0':'')+s;
}

function initGame(){
  go2=false;keys2=0;stTime=Date.now();
  document.getElementById('ov').style.display='none';
  if(tInt)clearInterval(tInt);
  tInt=setInterval(updateTimer,1000);
  resize();generateMaze();
}

document.addEventListener('keydown',function(e){
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp'){keyW=true;e.preventDefault();}
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown'){keyS=true;e.preventDefault();}
  if(e.key==='a'||e.key==='A'){keyA=true;e.preventDefault();}
  if(e.key==='d'||e.key==='D'){keyD=true;e.preventDefault();}
  if(e.key==='ArrowLeft'){keyLeft=true;e.preventDefault();}
  if(e.key==='ArrowRight'){keyRight=true;e.preventDefault();}
});
document.addEventListener('keyup',function(e){
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')keyW=false;
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')keyS=false;
  if(e.key==='a'||e.key==='A')keyA=false;
  if(e.key==='d'||e.key==='D')keyD=false;
  if(e.key==='ArrowLeft')keyLeft=false;
  if(e.key==='ArrowRight')keyRight=false;
});

let lastTouchX=null;
cv.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===1){lastTouchX=e.touches[0].clientX;}
  if(e.touches.length>=2){
    let t=e.touches[0];
    let r=cv.getBoundingClientRect();
    let ny2=(t.clientY-r.top)/H;
    let nx2=(t.clientX-r.left)/W;
    if(ny2<0.4)keyW=true;else if(ny2>0.6)keyS=true;
    if(nx2<0.3)keyA=true;else if(nx2>0.7)keyD=true;
  }
},{passive:false});

cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&lastTouchX!==null){
    let dx2=e.touches[0].clientX-lastTouchX;
    pAngle+=dx2*0.005;
    lastTouchX=e.touches[0].clientX;
  }
},{passive:false});

cv.addEventListener('touchend',function(e){
  e.preventDefault();
  lastTouchX=null;
  keyW=false;keyS=false;keyA=false;keyD=false;
});

addEventListener('resize',function(){resize();});
function loop(){update();draw();requestAnimationFrame(loop);}
initGame();loop();
</script>
</body>
</html>
